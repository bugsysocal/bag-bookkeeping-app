<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LedgerOne</title>
<style>
  /* Owner-language wizard (Spec 02 §5) behind the EULA gate (Spec 10 §5b).
     Lexicon rule (Spec 07 §4): no accounting vocabulary anywhere on these screens. */
  :root { --green:#14532d; --ink:#1d2733; --mut:#64748b; --line:#e5e7eb; }
  body { font-family:"Segoe UI",system-ui,sans-serif; margin:0; background:#f7f6f2; color:var(--ink); }
  header { background:var(--green); color:#fff; padding:14px 24px; font-size:18px; font-weight:600; }
  main { max-width:760px; margin:28px auto; padding:0 16px; }
  .card { background:#fff; border-radius:10px; padding:22px 26px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  h3 { margin:0 0 4px; } .mut { color:var(--mut); font-size:13px; }
  label { display:block; margin:12px 0 4px; font-weight:600; font-size:14px; }
  input[type=text], input[type=date], select { width:100%; box-sizing:border-box; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:15px; }
  .row { display:flex; gap:10px; } .row > * { flex:1; }
  /* Bottom-align paired inputs even when one label wraps (fixes Step-1 TIN/license baseline) */
  .row > div { display:flex; flex-direction:column; justify-content:flex-end; }
  .toolbar { display:flex; gap:10px; margin:0 0 16px; align-items:center; }
  .toolbar .spacer { flex:1; }
  .chip { padding:2px 10px; border-radius:99px; font-size:12px; font-weight:600; }
  .chip.paid { background:#f0fdf4; color:#166534; } .chip.sent { background:#eff6ff; color:#1e40af; }
  .chip.partially_paid { background:#fefce8; color:#854d0e; } .chip.overdue { background:#fef2f2; color:#991b1b; }
  .chip.draft { background:#f1f5f9; color:#475569; } .chip.void { background:#f1f5f9; color:#94a3b8; text-decoration:line-through; }
  a.navlink { color:var(--green); cursor:pointer; text-decoration:none; font-weight:600; margin-right:14px; }
  tr.rowlink:hover td { background:#f8faf8; cursor:pointer; }
  /* Session strip (Spec 07 §5): who's using it, and — when elevated — an
     unmistakable badge. A screenshot must be unambiguous about mode. */
  .sessionbar { display:flex; align-items:center; gap:10px; margin:0 0 10px; font-size:13px; color:var(--mut); }
  .sessionbar .who { font-weight:600; color:var(--ink); }
  .advisor-badge { background:#7c2d12; color:#fff; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:700; letter-spacing:.3px; }
  .sessionbar a.navlink { font-weight:500; font-size:13px; margin-right:10px; }
  .pinbox { display:inline-flex; gap:6px; align-items:center; }
  .pinbox input { width:120px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; }
  .userpick { display:flex; flex-direction:column; gap:8px; margin-top:14px; }
  .userpick button { text-align:left; padding:14px 18px; }
  .userpick .role { font-weight:400; opacity:.8; font-size:12px; }
  @media print { /* the document view prints clean; system dialog's PDF printer = Save as PDF (Spec 03 §7) */
    header, .toolbar, .no-print, #toast, #err { display:none !important; }
    body { background:#fff; } main { margin:0; max-width:none; }
    .card { box-shadow:none; border-radius:0; padding:0; }
  }
  button { background:var(--green); color:#fff; border:0; border-radius:8px; padding:10px 18px; font-size:15px; cursor:pointer; }
  button.ghost { background:#fff; color:var(--green); border:1px solid var(--green); }
  button:disabled { opacity:.45; cursor:default; }
  .nav { display:flex; justify-content:space-between; margin-top:20px; }
  .error { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:12px 16px; color:#7f1d1d; margin-top:12px; }
  .ok { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; margin-top:10px; font-size:14px; }
  .radio label { font-weight:400; margin:6px 0; } .radio input { margin-right:8px; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  td, th { padding:6px 4px; border-bottom:1px solid #eef2f7; text-align:left; font-size:14px; }
  td:last-child { text-align:right; font-variant-numeric:tabular-nums; }
  .steps { font-size:12px; color:var(--mut); margin-bottom:10px; letter-spacing:.4px; }
  .eula { max-height:340px; overflow-y:auto; border:1px solid var(--line); border-radius:8px; padding:14px 18px; font-size:13px; line-height:1.55; background:#fafafa; }
  .num { font-variant-numeric:tabular-nums; font-size:26px; font-weight:700; }
</style>
</head>
<body>
<header>LedgerOne <span style="font-weight:400;opacity:.75">— your books, always balanced</span></header>
<main id="main"></main>
<script>
const invoke = window.__TAURI__.core.invoke;
const EULA_VERSION = "EULA-DRAFT-1";
const naira = k => "₦" + (k/100).toLocaleString("en-NG",{minimumFractionDigits:2});
const kobo = s => { const n = parseFloat(String(s||"0").replace(/[₦,\s]/g,"")); return isNaN(n) ? 0 : Math.round(n*100); };
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Wizard state (Spec 02 §5) — committed atomically at the end, nothing before.
const S = {
  name:"", business_type:"trading", tin:"", fiscal_month:1, license_key:"",
  turnover:"", assets_small:null, professional:null, vat_answer:"",
  inventory:false,
  banks:[{label:"GTBank Current",kind:"bank",currency:"NGN",bal:""},{label:"Petty Cash",kind:"cash",currency:"NGN",bal:""}],
  customers:[], suppliers:[], opening_date:new Date().toISOString().slice(0,10),
  invoice_start:"1", owner:"", staff:"", pin:"", pin2:"",
};
// Spec 02 §5.2 derivation — the two reliefs are independent and never conflated.
const derive = () => {
  const P = S.professional === true;
  const vat_exempt = S.turnover==="under50" && !P;
  const cit_exempt = (S.turnover!=="over100") && S.assets_small===true && !P;
  const vat_registered = S.vat_answer==="yes" ? true : S.vat_answer==="no" ? false : !vat_exempt;
  return { vat_exempt, cit_exempt, vat_registered };
};

let step = 0;
const el = id => document.getElementById(id);
const err = e => { const b = el("err"); if (b) b.innerHTML =
  `<div class="error">${esc((e&&e.message)||"Something went wrong. Please try again.")}</div>`; };

const STEPS = [eulaStep, basicsStep, taxStep, stockStep, banksStep, owesStep, numberStep, peopleStep, reviewStep];
function render(){ el("main") && (document.getElementById("main").innerHTML = ""); STEPS[step](); }
function shell(title, sub, body, canBack=true, nextLabel="Continue"){
  el("main").innerHTML = `<div class="card">
    <div class="steps">STEP ${step} OF 8</div><h3>${title}</h3><div class="mut">${sub}</div>
    ${body}<div id="err"></div>
    <div class="nav">
      <button class="ghost" id="back" ${canBack?"":"style='visibility:hidden'"}>Back</button>
      <button id="next">${nextLabel}</button>
    </div></div>`;
  el("back").onclick = () => { step--; render(); };
}

// ── Step 0: EULA gate (Spec 10 §5b) — full text in docs/legal/EULA.md
function eulaStep(){
  el("main").innerHTML = `<div class="card">
    <h3>Before you start</h3>
    <div class="mut">Please read and accept this agreement. (Draft ${EULA_VERSION} — pending legal review.)</div>
    <div class="eula">
      <p><b>END USER LICENSE AGREEMENT AND DISCLAIMER</b> — between you and <b>Bolton Advisory Group</b> for the LedgerOne software.</p>
      <p><b>1. License.</b> You may install and use LedgerOne for your own business record-keeping. No resale, sublicensing, or reverse engineering.</p>
      <p><b>2. Your data is yours.</b> Everything you enter stays on your computer and belongs to you. We do not receive or access it. Optional features that send data elsewhere (like Google Sheets) stay off unless you turn them on.</p>
      <p><b>3. No warranty of accuracy for calculated figures.</b> LedgerOne calculates totals, profit, VAT, withholding tax and other amounts from what <i>you</i> enter. We do not warrant any calculated figure is accurate or suitable for any purpose. Errors in input produce errors in output.</p>
      <p><b>4. Check before you file.</b> You are solely responsible for verifying every figure and report before submitting anything to FIRS, any State revenue service, any lender, or any other party. Reports are working documents, not filings.</p>
      <p><b>5. No professional relationship.</b> Using this software does not, by itself, make Bolton Advisory Group your accountant, tax adviser, auditor, or lawyer. Professional advice requires a separate written engagement.</p>
      <p><b>6. Limitation of liability.</b> The software is provided "as is". To the maximum extent Nigerian law permits, we are not liable for indirect or consequential losses (including penalties or fines from filings), and our total liability is capped at the license fees you paid in the last 12 months, or ₦50,000 if none.</p>
      <p><b>7–8.</b> Updates are your choice. Governed by the laws of the Federal Republic of Nigeria. Your acceptance is recorded, with date and version, in the software's tamper-evident activity log.</p>
    </div>
    <label style="font-weight:400;margin-top:14px"><input type="checkbox" id="agree" /> I have read and accept this agreement</label>
    <div id="err"></div>
    <div class="nav"><span></span><button id="next" disabled>I agree — set up my business</button></div></div>`;
  el("agree").onchange = e => el("next").disabled = !e.target.checked;
  el("next").onclick = () => { step = 1; render(); };
}

// ── Step 1: basics
function basicsStep(){
  shell("Your business","Just the essentials — everything can be changed later.",`
    <label>Business name</label><input type="text" id="f-name" value="${esc(S.name)}" />
    <div class="row"><div><label>What kind of business?</label>
      <select id="f-type">
        ${["trading|Buying & selling goods","services|Services","manufacturing|Making things","agency|Agency / commissions","mixed|A mix"]
          .map(o=>{const [v,t]=o.split("|");return `<option value="${v}" ${S.business_type===v?"selected":""}>${t}</option>`}).join("")}
      </select></div>
      <div><label>When does your business year start?</label>
      <select id="f-month">${["January","February","March","April","May","June","July","August","September","October","November","December"]
        .map((m,i)=>`<option value="${i+1}" ${S.fiscal_month===i+1?"selected":""}>${m}</option>`).join("")}</select></div></div>
    <div class="row"><div><label>Your FIRS TIN <span class="mut">(optional — add later if you don't have it handy)</span></label>
      <input type="text" id="f-tin" value="${esc(S.tin)}" /></div>
      <div><label>License key <span class="mut">(from your welcome letter)</span></label>
      <input type="text" id="f-lic" value="${esc(S.license_key)}" placeholder="LO-…" /></div></div>`, false);
  el("next").onclick = () => {
    S.name = el("f-name").value.trim(); S.business_type = el("f-type").value;
    S.fiscal_month = +el("f-month").value; S.tin = el("f-tin").value.trim(); S.license_key = el("f-lic").value.trim();
    if (!S.name) return err({message:"Please enter your business name."});
    step = 2; render();
  };
}

// ── Step 2: the three tax questions + VAT registration (Spec 02 §5.2, owner language only)
function taxStep(){
  const d = derive();
  shell("A few questions about size","Answer about your business — we handle the tax rules.",`
    <label>Roughly how much does your business sell in a year?</label>
    <div class="radio">
      ${[["under50","Under ₦50 million"],["between","₦50 million – ₦100 million"],["over100","Over ₦100 million"]]
        .map(([v,t])=>`<label><input type="radio" name="t" value="${v}" ${S.turnover===v?"checked":""}/>${t}</label>`).join("")}
    </div>
    <div id="q2" style="display:${S.turnover==="over100"?"none":"block"}">
      <label>Is the total value of your business property — vehicles, equipment, machinery, buildings — under ₦250 million?</label>
      <div class="radio">
        ${[["yes","Yes"],["no","No"],["unsure","Not sure"]].map(([v,t])=>
          `<label><input type="radio" name="a" value="${v}" ${S.assets_small===(v==="yes")&&S.assets_small!==null&&(v!=="unsure")?"checked":""}/>${t}</label>`).join("")}
      </div></div>
    <label>Is your business a professional practice — law, accountancy, consulting, engineering services, medical practice, or similar?</label>
    <div class="radio">
      ${[["yes","Yes"],["no","No"]].map(([v,t])=>
        `<label><input type="radio" name="p" value="${v}" ${S.professional===(v==="yes")&&S.professional!==null?"checked":""}/>${t}</label>`).join("")}
    </div>
    <label>Are you registered for VAT with FIRS?</label>
    <div class="radio">
      ${[["yes","Yes"],["no","No"],["unsure","Not sure"]].map(([v,t])=>
        `<label><input type="radio" name="v" value="${v}" ${S.vat_answer===v?"checked":""}/>${t}</label>`).join("")}
    </div>
    <div class="ok" id="summary" style="display:none"></div>`);
  const upd = () => {
    const t = document.querySelector("input[name=t]:checked"); const a = document.querySelector("input[name=a]:checked");
    const p = document.querySelector("input[name=p]:checked"); const v = document.querySelector("input[name=v]:checked");
    S.turnover = t? t.value : ""; el("q2").style.display = S.turnover==="over100" ? "none":"block";
    S.assets_small = a ? (a.value==="yes") : null;             // "Not sure" ⇒ treated as No, advisor revisits
    S.professional = p ? (p.value==="yes") : null;
    S.vat_answer = v ? v.value : "";
    if (S.turnover && S.professional!==null){
      const d2 = derive();
      const lines = [
        d2.vat_registered ? "✓ You'll add 7.5% VAT to your invoices."
                          : "✓ You won't add VAT to your invoices.",
        d2.cit_exempt ? "✓ For payments to suppliers with a TIN, under ₦2 million a month, you won't need to hold back tax."
                      : "• When paying some suppliers, you may need to hold back a small tax portion — LedgerOne handles the sums.",
      ];
      if (!d2.vat_registered && S.turnover!=="under50")
        lines.push("⚠ Businesses selling above ₦50M must register for VAT with FIRS. LedgerOne will not add VAT to your invoices until your advisor switches this on.");
      el("summary").style.display=""; el("summary").innerHTML = lines.map(esc).join("<br>");
    }
  };
  document.querySelectorAll("input[type=radio]").forEach(r => r.onchange = upd); upd();
  el("next").onclick = () => {
    if (!S.turnover) return err({message:"Please pick your yearly sales range."});
    if (S.turnover!=="over100" && S.assets_small===null) return err({message:"Please answer the business property question."});
    if (S.professional===null) return err({message:"Please answer the professional practice question."});
    step = 3; render();
  };
}

// ── Step 3: stock
function stockStep(){
  shell("Do you hold stock?","If you mainly sell services, or buy only when a customer orders, choose No — you can switch this on later.",`
    <div class="radio">
      <label><input type="radio" name="s" value="yes" ${S.inventory?"checked":""}/>Yes — I buy goods and hold them to resell</label>
      <label><input type="radio" name="s" value="no" ${!S.inventory?"checked":""}/>No — no stock to track</label>
    </div>`);
  el("next").onclick = () => { S.inventory = document.querySelector("input[name=s]:checked").value==="yes"; step=4; render(); };
}

// ── Step 4: banks
function banksStep(){
  const rows = S.banks.map((b,i)=>`<tr>
    <td><input type="text" data-i="${i}" data-k="label" value="${esc(b.label)}" /></td>
    <td><select data-i="${i}" data-k="kind">
      ${[["bank","Bank account"],["pos_wallet","POS wallet"],["cash","Cash box"],["domiciliary","Domiciliary"]]
        .map(([v,t])=>`<option value="${v}" ${b.kind===v?"selected":""}>${t}</option>`).join("")}</select></td>
    <td><select data-i="${i}" data-k="currency">${["NGN","USD","GBP","EUR"]
        .map(c=>`<option ${b.currency===c?"selected":""}>${c}</option>`).join("")}</select></td>
    <td><input type="text" data-i="${i}" data-k="bal" value="${esc(b.bal)}" placeholder="0.00" style="text-align:right"/></td>
  </tr>`).join("");
  shell("Bank & cash","Every account you use for the business — and what's in each right now.",`
    <table><tr><th>Name</th><th>Type</th><th>Currency</th><th>Balance right now (₦)</th></tr>${rows}</table>
    <button class="ghost" id="add" style="margin-top:10px">+ Add another account</button>
    <label style="margin-top:16px">As of what date are these balances?</label>
    <input type="date" id="f-od" value="${S.opening_date}" style="max-width:220px"/>`);
  document.querySelectorAll("[data-i]").forEach(inp => inp.onchange = e => {
    S.banks[+e.target.dataset.i][e.target.dataset.k] = e.target.value; });
  el("add").onclick = () => { S.banks.push({label:"",kind:"bank",currency:"NGN",bal:""}); render(); };
  el("next").onclick = () => {
    S.opening_date = el("f-od").value;
    S.banks = S.banks.filter(b=>b.label.trim());
    if (!S.banks.length) return err({message:"Add at least one bank or cash account."});
    step=5; render();
  };
}

// ── Step 5: who owes you / who you owe (skippable)
function owesStep(){
  const list = (arr, key) => arr.map((c,i)=>`<tr>
    <td><input type="text" data-l="${key}" data-i="${i}" data-k="name" value="${esc(c.name)}" placeholder="Name"/></td>
    <td><input type="text" data-l="${key}" data-i="${i}" data-k="phone" value="${esc(c.phone||"")}" placeholder="Phone (optional)"/></td>
    <td><input type="text" data-l="${key}" data-i="${i}" data-k="amt" value="${esc(c.amt||"")}" placeholder="0.00" style="text-align:right"/></td>
  </tr>`).join("");
  shell("Money already out there","Skip this to start fresh — you can only record things from today onwards if you do.",`
    <label>Who owes you money right now?</label>
    <table>${list(S.customers,"c")}</table>
    <button class="ghost" id="addc">+ Add customer</button>
    <label style="margin-top:18px">Who do you owe money to?</label>
    <table>${list(S.suppliers,"s")}</table>
    <button class="ghost" id="adds">+ Add supplier</button>`);
  document.querySelectorAll("[data-l]").forEach(inp => inp.onchange = e => {
    const arr = e.target.dataset.l==="c" ? S.customers : S.suppliers;
    arr[+e.target.dataset.i][e.target.dataset.k] = e.target.value; });
  el("addc").onclick = () => { S.customers.push({name:"",phone:"",amt:""}); render(); };
  el("adds").onclick = () => { S.suppliers.push({name:"",phone:"",amt:""}); render(); };
  el("next").onclick = () => {
    S.customers = S.customers.filter(c=>c.name.trim()); S.suppliers = S.suppliers.filter(c=>c.name.trim());
    for (const c of [...S.customers,...S.suppliers]) if (kobo(c.amt)<=0)
      return err({message:`Please enter the amount for ${c.name}.`});
    step=6; render();
  };
}

// ── Step 6: invoice numbering
function numberStep(){
  shell("Invoice numbers","Continuing from a paper book? Start from your next number.",`
    <label>What number should your first invoice have?</label>
    <input type="text" id="f-start" value="${esc(S.invoice_start)}" style="max-width:220px"/>
    <div class="mut" style="margin-top:6px">Example: 2451 → your first invoice is INV-002451. Numbers run in order and are never reused.</div>`);
  el("next").onclick = () => {
    const n = parseInt(el("f-start").value,10);
    if (!n || n<1) return err({message:"Please enter a whole number, 1 or higher."});
    S.invoice_start = String(n); step=7; render();
  };
}

// ── Step 7: people & PIN
function peopleStep(){
  shell("Who uses LedgerOne here?","Separate names mean you can always see who recorded what.",`
    <label>Your name (the owner)</label><input type="text" id="f-owner" value="${esc(S.owner)}"/>
    <label>Does someone else enter records for you? <span class="mut">(optional)</span></label>
    <input type="text" id="f-staff" value="${esc(S.staff)}" placeholder="e.g. your accounts officer"/>
    <label>Choose a 6-digit PIN for the accountant's area</label>
    <div class="row">
      <input type="text" id="f-pin" maxlength="6" value="${esc(S.pin)}" placeholder="6 digits" inputmode="numeric"/>
      <input type="text" id="f-pin2" maxlength="6" value="${esc(S.pin2)}" placeholder="Repeat PIN" inputmode="numeric"/>
    </div>
    <div class="mut" style="margin-top:6px">This PIN protects the accountant's area. Your advisor will ask you for it when they review your books.</div>`);
  el("next").onclick = () => {
    S.owner = el("f-owner").value.trim(); S.staff = el("f-staff").value.trim();
    S.pin = el("f-pin").value.trim(); S.pin2 = el("f-pin2").value.trim();
    if (!S.owner) return err({message:"Please enter your name."});
    if (!/^\d{6}$/.test(S.pin)) return err({message:"The PIN must be exactly 6 digits."});
    if (S.pin !== S.pin2) return err({message:"The two PINs don't match."});
    step=8; render();
  };
}

// ── Step 8: review & atomic create (W1)
function reviewStep(){
  const d = derive();
  const bankTotal = S.banks.reduce((t,b)=>t+kobo(b.bal),0);
  shell("Ready to create your books","Nothing is saved until you press the button — check the summary.",`
    <table>
      <tr><td>Business</td><td>${esc(S.name)}</td></tr>
      <tr><td>VAT on invoices</td><td>${d.vat_registered?"Yes — 7.5%":"No"}</td></tr>
      <tr><td>Stock tracking</td><td>${S.inventory?"On":"Off"}</td></tr>
      <tr><td>Accounts</td><td>${S.banks.map(b=>esc(b.label)).join(", ")} (${naira(bankTotal)})</td></tr>
      <tr><td>Customers owing</td><td>${S.customers.length} — ${naira(S.customers.reduce((t,c)=>t+kobo(c.amt),0))}</td></tr>
      <tr><td>Suppliers owed</td><td>${S.suppliers.length} — ${naira(S.suppliers.reduce((t,c)=>t+kobo(c.amt),0))}</td></tr>
      <tr><td>First invoice</td><td>INV-${String(S.invoice_start).padStart(6,"0")}</td></tr>
      <tr><td>People</td><td>${esc(S.owner)}${S.staff?", "+esc(S.staff):""}</td></tr>
    </table>`, true, "Create my books");
  el("next").onclick = async () => {
    el("next").disabled = true;
    const d2 = derive();
    try {
      const co = await invoke("create_company_full", { input: {
        company: { name:S.name, vat_registered:d2.vat_registered, vat_exempt:d2.vat_exempt,
          cit_exempt:d2.cit_exempt, inventory_enabled:S.inventory, fiscal_year_start_month:S.fiscal_month,
          business_type:S.business_type, tin:S.tin||null, invoice_start:parseInt(S.invoice_start,10),
          license_key:S.license_key||null },
        banks: S.banks.map(b=>({label:b.label,kind:b.kind,currency:b.currency,opening_balance_kobo:kobo(b.bal)})),
        customers_owing: S.customers.map(c=>({name:c.name,phone:c.phone||null,amount_kobo:kobo(c.amt)})),
        suppliers_owed: S.suppliers.map(c=>({name:c.name,phone:c.phone||null,amount_kobo:kobo(c.amt)})),
        opening_date: S.opening_date, owner_name:S.owner, staff_name:S.staff||null,
        advisor_pin: S.pin, eula_version: EULA_VERSION,
      }});
      CO = co;
      // The wizard just signed the owner in server-side (Spec 07 §5: a session
      // is established, not a second manual login step right after setup).
      SESSION = await invoke("current_session");
      viewDashboard();
    } catch(e){ el("next").disabled = false; err(e); }
  };
}

let CO = null;                      // active company {id, name}
let SESSION = null;                 // {user_id, company_id, role, name, advisor_active}

const dmy = iso => iso ? `${iso.slice(8,10)}/${iso.slice(5,7)}/${iso.slice(0,4)}` : "";
const VAT_BP = 750;                 // display estimate only — the engine's numbers are the truth

// Three primary actions, always visible (Spec 07 §2.2), plus the session
// strip every screen carries (Spec 07 §5: badge must be unambiguous).
function chrome(active, body){
  el("main").innerHTML = `
    <div class="sessionbar no-print">
      <span class="who">${esc(SESSION?.name||"")}</span>
      <span>(${esc(SESSION?.role||"")})</span>

// Staff never sees an elevation control at all (Spec 07 §5: eligible = owner/advisor).
function paintAdvisorControl(active, body){
  const box = el("advisorctl");
  if (!box || !SESSION || SESSION.role === "staff") return;
  if (SESSION.advisor_active){
    box.innerHTML = `<a class="navlink" id="advisor-exit">Exit Advisor Mode</a>`;
    el("advisor-exit").onclick = async () => {
      try { await invoke("advisor_exit"); SESSION.advisor_active = false; chrome(active, body); }
      catch(e){ err(e); }
    };
    return;
  }
  box.innerHTML = `<a class="navlink" id="advisor-open">Enter Advisor Mode</a>`;
  el("advisor-open").onclick = () => {
    box.innerHTML = `<span class="pinbox">
      <input type="text" id="advisor-pin" maxlength="6" placeholder="6-digit PIN" inputmode="numeric"/>
      <button id="advisor-go" style="padding:5px 12px">Unlock</button></span>`;
    el("advisor-go").onclick = async () => {
      try {
        SESSION = await invoke("advisor_enter",{pin:el("advisor-pin").value});
        chrome(active, body);
      } catch(e){ err(e); }
    };
  };
}

// ── Sales register: invoices + quotes (Spec 03 §2/§3; Overdue derived, never stored)
async function viewInvoices(){
  const rows = await invoke("list_invoices",{companyId:CO.id});
  const body = rows.length ? `<div class="card"><h3>Sales — invoices &amp; quotes</h3>
      <button class="ghost" id="newquote" style="float:right;margin-top:-34px">New quote</button>
      <table>
      <tr><th>Number</th><th>Customer</th><th>Date</th><th>Status</th><th>Total</th><th>Still owed</th><th></th></tr>
      ${rows.map(r=>{
        const chip = r.overdue ? "overdue" : r.status;
        const label = r.kind==="quote"
          ? ({draft:"Quote",sent:"Quote sent",converted:"Became invoice",void:"Cancelled"}[r.status]||r.status)
          : (r.overdue ? "Overdue" : ({draft:"Draft",sent:"Sent",partially_paid:"Part-paid",paid:"Paid",void:"Cancelled"}[r.status]||r.status));
        const acts = [];
        if (r.status!=="void") acts.push(`<a class="navlink" data-act="doc" data-id="${r.id}">View</a>`);
        if (r.kind==="invoice" && r.status==="draft") acts.push(`<a class="navlink" data-act="send" data-id="${r.id}">Send</a>`);
        if (r.kind==="quote" && (r.status==="draft"||r.status==="sent")) acts.push(`<a class="navlink" data-act="convert" data-id="${r.id}">Make invoice</a>`);
        if (r.status!=="void" && r.status!=="converted" && r.paid_kobo===0) acts.push(`<a class="navlink" data-act="void" data-id="${r.id}" data-n="${esc(r.number)}">Cancel</a>`);
        return `<tr><td>${esc(r.number)}</td><td>${esc(r.customer)}</td><td>${dmy(r.issue_date)}</td>
          <td><span class="chip ${chip}">${label}</span></td><td>${naira(r.total_kobo)}</td>
          <td>${r.kind==="quote"?"—":naira(r.total_kobo-r.paid_kobo)}</td><td>${acts.join(" ")}</td></tr>`;
      }).join("")}</table></div>`
    : `<div class="card"><h3>Sales</h3><div class="mut">No invoices yet — create your first with the button above.</div>
       <button class="ghost" id="newquote">New quote</button></div>`;
  chrome("inv", body);
  el("newquote") && (el("newquote").onclick = () => viewNewInvoice(true));
  document.querySelectorAll("[data-act]").forEach(a => a.onclick = async () => {
    const id = a.dataset.id;
    try {
      if (a.dataset.act==="doc") return viewDoc(id);
      if (a.dataset.act==="send"){ await invoke("send_invoice",{invoiceId:id, confirmSoftClose:false}); toast("Sent — it's now in your books."); }
      if (a.dataset.act==="convert"){ const d = await invoke("convert_quote_cmd",{quoteId:id}); toast(`Quote became draft invoice ${d.number} — review and send it.`); }
      if (a.dataset.act==="void"){
        if (!window.confirm(`Cancel ${a.dataset.n}? It stays in your records, marked as cancelled — nothing is ever deleted.`)) return;
        await invoke("void_invoice_cmd",{invoiceId:id, confirmSoftClose:false}); toast(`${a.dataset.n} cancelled.`);
      }
      viewInvoices();
    } catch(e){ err(e); }
  });
}

// ── New invoice or quote (Spec 03 §4/§3) — free-description lines; VAT per line;
//    totals are estimates, frozen server-side at posting (engine rounding is normative).
function viewNewInvoice(isQuote){
  customerPicker("cust").then(pickerHtml => {
    const L = [{d:"",q:"1",p:"",disc:"0",vat:true}];
    const linesHtml = () => L.map((l,i)=>`<tr>
      <td style="width:34%"><input type="text" data-i="${i}" data-k="d" value="${esc(l.d)}" placeholder="What did you sell?"/></td>
      <td><input type="text" data-i="${i}" data-k="q" value="${esc(l.q)}" style="text-align:right"/></td>
      <td><input type="text" data-i="${i}" data-k="p" value="${esc(l.p)}" placeholder="0.00" style="text-align:right"/></td>
      <td><input type="text" data-i="${i}" data-k="disc" value="${esc(l.disc)}" style="text-align:right"/></td>
      <td style="text-align:center"><input type="checkbox" data-i="${i}" data-k="vat" ${l.vat?"checked":""}/></td>
    </tr>`).join("");
    const totals = () => {
      let net = 0, vat = 0;
      for (const l of L){
        const qm = Math.round(parseFloat(l.q||"0")*1000), pk = kobo(l.p), db = Math.round(parseFloat(l.disc||"0")*100);
        if (qm>0 && pk>=0){ const n = Math.round(qm*pk/1000*(10000-db)/10000); net += n; if (l.vat) vat += Math.round(n*VAT_BP/10000); }
      }
      return {net, vat, total: net+vat};
    };
    const paint = () => {
      el("lines").innerHTML = linesHtml();
      document.querySelectorAll("#lines [data-i]").forEach(inp => {
        inp.onchange = e => { L[+e.target.dataset.i][e.target.dataset.k] =
          e.target.type==="checkbox" ? e.target.checked : e.target.value; sums(); };
      });
      sums();
    };
    const sums = () => { const t = totals();
      el("sums").innerHTML = `Subtotal ${naira(t.net)} · VAT ${naira(t.vat)} · <b>Total ${naira(t.total)}</b> <span class="mut">(final figures set when you send)</span>`; };
    chrome("newinv", `<div class="card"><h3>${isQuote?"New quote":"New invoice"}</h3>
      ${isQuote?`<div class="mut">A quote is a price offer — it never touches your books. Convert it to an invoice when the customer agrees.</div>`:""}
      ${pickerHtml}
      <div class="row"><div><label>${isQuote?"Quote date":"Invoice date"}</label><input type="date" id="f-issue" value="${today()}"/></div>
      <div><label>${isQuote?"Valid until":"Payment due by"}</label><input type="date" id="f-due" value="${today()}"/></div></div>
      <table><tr><th>Item</th><th>Qty</th><th>Price (₦)</th><th>Discount %</th><th>VAT</th></tr>
        <tbody id="lines"></tbody></table>
      <button class="ghost" id="addline" style="margin-top:8px">+ Add line</button>
      <div class="ok" id="sums" style="margin-top:14px"></div>
      <div class="nav"><button class="ghost" id="saveDraft">Save for later</button>
        ${isQuote?"<span></span>":`<button id="saveSend">Save &amp; send</button>`}</div></div>`);
    paint();
    wirePicker("cust", c => { viewNewInvoice(isQuote); });
    el("addline").onclick = () => { L.push({d:"",q:"1",p:"",disc:"0",vat:true}); paint(); };
    const collect = () => {
      const contact = el("cust").value;
      if (!contact) throw {message:"Please choose a customer first."};
      const lines = L.filter(l=>l.d.trim()).map(l=>({
        description:l.d.trim(), quantity_milli:Math.round(parseFloat(l.q||"0")*1000),
        unit_price_kobo:kobo(l.p), discount_bp:Math.round(parseFloat(l.disc||"0")*100), vat_applied:!!l.vat }));
      if (!lines.length) throw {message:"Add at least one line — what are you selling?"};
      return { company_id:CO.id, contact_id:contact, issue_date:el("f-issue").value, due_date:el("f-due").value,
               lines, kind: isQuote ? "quote" : "invoice" };
    };
    el("saveDraft").onclick = async () => {
      try { const d = await invoke("create_invoice_draft",{input:collect()});
        toast(isQuote ? `Quote ${d.number} saved.` : `Saved as a draft — ${d.number}.`); viewInvoices(); }
      catch(e){ err(e); }
    };
    const ss = el("saveSend");
    if (ss) ss.onclick = async () => {
      try { const d = await invoke("create_invoice_draft",{input:collect()});
        await invoke("send_invoice",{invoiceId:d.id, confirmSoftClose:false});
        toast(`${d.number} sent — it's now in your books.`); viewInvoices(); }
      catch(e){ err(e); }
    };
  });
}

// ── Record payment (Spec 03 §5): FIFO auto-allocation, WHT collapsed, deposit remainder live
function viewRecordPayment(){
  customerPicker("pc").then(async pickerHtml => {
    const banks = await invoke("list_bank_accounts",{companyId:CO.id});
    chrome("pay", `<div class="card"><h3>Record a payment you received</h3>${pickerHtml}
      <div class="row">
        <div><label>Paid into</label><select id="f-bank">${banks.map(b=>`<option value="${b.id}">${esc(b.label)}</option>`).join("")}</select></div>
        <div><label>Date</label><input type="date" id="f-date" value="${today()}"/></div>
        <div><label>Amount received (₦)</label><input type="text" id="f-amt" placeholder="0.00" style="text-align:right"/></div>
      </div>
      <details style="margin-top:10px"><summary class="mut">Did the customer deduct tax (WHT)?</summary>
        <label>Amount they held back (₦)</label>
        <input type="text" id="f-wht" placeholder="0.00" style="max-width:200px;text-align:right"/>
        <div class="mut">Enter exactly what they withheld — LedgerOne records it as tax you can claim.</div>
      </details>
      <div id="allocwrap"></div>
      <div class="ok" id="remain" style="display:none"></div>
      <div class="nav"><span></span><button id="savePay">Save payment</button></div></div>`);
    let open = [];
    const allocs = () => [...document.querySelectorAll("[data-alloc]")].map(inp => ({
      invoice_id: inp.dataset.alloc, amount_kobo: kobo(inp.value) }));
    const refreshRemain = () => {
      const cash = kobo(el("f-amt").value), wht = kobo(el("f-wht") ? el("f-wht").value : "0");
      const used = allocs().reduce((t,a)=>t+a.amount_kobo,0);
      const left = cash + wht - used;
      const r = el("remain"); r.style.display = "";
      r.innerHTML = left > 0 ? `₦${(left/100).toLocaleString("en-NG")} will be kept as a deposit for this customer.`
        : left === 0 ? "Everything is matched to invoices." : `<span style="color:#991b1b">You've matched more than was received.</span>`;
    };
    const autoFill = () => { // FIFO by due date (server ordering), editable after
      let pool = kobo(el("f-amt").value) + kobo(el("f-wht") ? el("f-wht").value : "0");
      document.querySelectorAll("[data-alloc]").forEach(inp => {
        const bal = +inp.dataset.bal; const take = Math.max(0, Math.min(bal, pool)); pool -= take;
        inp.value = take ? (take/100).toFixed(2) : ""; });
      refreshRemain();
    };
    const loadOpen = async () => {
      const cid = el("pc").value; if (!cid) { el("allocwrap").innerHTML = ""; return; }
      open = await invoke("open_invoices",{companyId:CO.id, contactId:cid});
      el("allocwrap").innerHTML = open.length ? `<table>
          <tr><th>Invoice</th><th>Due</th><th>Still owed</th><th>Pay off (₦)</th></tr>
          ${open.map(o=>`<tr><td>${esc(o.number)}</td><td>${dmy(o.due_date)}</td><td>${naira(o.balance_kobo)}</td>
            <td><input type="text" data-alloc="${o.id}" data-bal="${o.balance_kobo}" style="text-align:right"/></td></tr>`).join("")}
        </table>`
        : `<div class="mut" style="margin-top:10px">No unpaid invoices — this whole amount will be kept as the customer's deposit ("paid ahead").</div>`;
      document.querySelectorAll("[data-alloc]").forEach(inp => inp.onchange = refreshRemain);
      autoFill();
    };
    el("pc").onchange = loadOpen;
    el("f-amt").onchange = autoFill;
    el("f-wht").onchange = autoFill;
    wirePicker("pc", c => viewRecordPayment());
    el("savePay").onclick = async () => {
      try {
        const cid = el("pc").value; if (!cid) return err({message:"Please choose a customer first."});
        const res = await invoke("record_payment_in",{input:{
          company_id:CO.id, contact_id:cid, bank_account_id:el("f-bank").value,
          payment_date:el("f-date").value, amount_kobo:kobo(el("f-amt").value),
          wht_kobo:kobo(el("f-wht").value), allocations:allocs().filter(a=>a.amount_kobo>0),
          confirm_soft_close:false }});
        toast(`Payment saved${res.receipt_number ? " — receipt " + res.receipt_number : ""}${res.deposit_kobo>0 ? `; ${naira(res.deposit_kobo)} kept as deposit` : ""}.`);
        viewInvoices();
      } catch(e){ err(e); }
    };
  });
}

      ${rows.map(r=>{
        const chip = r.overdue ? "overdue" : ({open:"sent",partially_paid:"partially_paid",paid:"paid",draft:"draft",void:"void"}[r.status]||r.status);
        const label = r.overdue ? "Overdue" : ({open:"To pay",partially_paid:"Part-paid",paid:"Paid",draft:"Draft",void:"Cancelled"}[r.status]||r.status);
        return `<tr><td>${esc(r.supplier)}</td><td>${esc(r.reference||"")}</td><td>${dmy(r.bill_date)}</td><td>${dmy(r.due_date)}</td>
          <td><span class="chip ${chip}">${label}</span></td><td>${naira(r.total_kobo)}</td><td>${naira(r.total_kobo-r.paid_kobo)}</td></tr>`;
      }).join("")}</table>`
      : `<div class="mut">No supplier bills yet. Quick one-off costs go through <b>Record Expense</b>; bills you'll pay later are recorded here.</div>`}
    </div>`;
  chrome("pur", body);
  el("newbill").onclick = viewNewBill;
  el("paysup").onclick = viewPaySupplier;
}

    <div class="row">
      <div><label>Their invoice number <span class="mut">(optional)</span></label><input type="text" id="f-ref"/></div>

    <button class="ghost" id="addbl" style="margin-top:8px">+ Add line</button>

      </select>

    </details>
    <div class="nav"><span></span><button id="saveb">Save bill</button></div></div>`);

function wireSupplierPicker(sel, onCreated){

      onCreated(c);
    } catch(e){ err(e); }
  };
}

// ── Pay a supplier (Spec 04 §3): FIFO allocations; WHT auto with the exemption;
//    a no-TIN supplier surfaces the explicit 2× decision, never silent.
async function viewPaySupplier(){
  const sup = await supplierPicker("ps");
  const banks = await invoke("list_bank_accounts",{companyId:CO.id});
  chrome("paysup", `<div class="card"><h3>Pay a supplier</h3>${sup}
    <div class="row">
      <div><label>Paid from</label><select id="f-bank">${banks.map(b=>`<option value="${b.id}">${esc(b.label)}</option>`).join("")}</select></div>
      <div><label>Date</label><input type="date" id="f-date" value="${today()}"/></div>
    </div>
    <div id="billwrap"></div>
    <div class="ok" id="paysum" style="display:none"></div>
    <div id="whtdecide" style="display:none" class="error"></div>
    <div class="nav"><span></span><button id="dopay">Pay</button></div></div>`);
  let whtOverride = null; // null = auto; {mode:"manual", amount} | {mode:"off"}
  const allocs = () => [...document.querySelectorAll("[data-balloc]")].map(inp => ({
    invoice_id: inp.dataset.balloc, amount_kobo: kobo(inp.value) })).filter(a=>a.amount_kobo>0);
  const loadBills = async () => {
    whtOverride = null; el("whtdecide").style.display = "none";
    const cid = el("ps").value; if (!cid){ el("billwrap").innerHTML=""; return; }
    const bills = await invoke("open_bills",{companyId:CO.id, contactId:cid});
    el("billwrap").innerHTML = bills.length ? `<table>
        <tr><th>Bill</th><th>Due</th><th>Still owed</th><th>Pay off (₦)</th></tr>
        ${bills.map(b=>`<tr><td>${esc(b.reference||"(no ref)")}${b.wht_applicable?' <span class="mut">· tax may apply</span>':""}</td>
          <td>${dmy(b.due_date)}</td><td>${naira(b.balance_kobo)}</td>
          <td><input type="text" data-balloc="${b.id}" value="${(b.balance_kobo/100).toFixed(2)}" style="text-align:right"/></td></tr>`).join("")}
      </table>`
      : `<div class="mut" style="margin-top:10px">No unpaid bills for this supplier.</div>`;
  };
  el("ps").onchange = loadBills;
  wireSupplierPicker("ps", () => viewPaySupplier());
  el("dopay").onclick = async () => {
    const cid = el("ps").value; if (!cid) return err({message:"Please choose a supplier first."});
    const a = allocs(); if (!a.length) return err({message:"Enter how much of which bill you're paying."});
    const base = { company_id:CO.id, contact_id:cid, bank_account_id:el("f-bank").value,
      payment_date:el("f-date").value, allocations:a, confirm_soft_close:false };
    const input = whtOverride===null ? {...base, wht_mode:"auto", wht_manual_kobo:null}
      : whtOverride.mode==="off" ? {...base, wht_mode:"off", wht_manual_kobo:null}
      : {...base, wht_mode:"manual", wht_manual_kobo:whtOverride.amount};
    try {
      const res = await invoke("record_payment_out",{input});
      toast(res.wht_kobo>0
        ? `Paid. ${naira(res.wht_kobo)} held back as tax — remember it goes to FIRS, not to you.`
        : "Supplier paid in full — no tax deduction needed.");
      viewPurchases();
    } catch(e){
      if (e && e.code === "wht_decision"){
        // The engine refused to decide silently (Spec 01 §6.2). Put the decision on screen.
        const w = el("whtdecide"); w.style.display = "";
        w.innerHTML = `${esc(e.message)}<div class="row" style="margin-top:10px">
          <div><label>Hold back this much (₦)</label><input type="text" id="whtamt" style="text-align:right"/></div>
          <div style="display:flex;align-items:flex-end;gap:8px">
            <button id="whtgo">Pay with this deduction</button>
            <button class="ghost" id="whtnone">No deduction</button></div></div>`;
        el("whtgo").onclick = () => { whtOverride = {mode:"manual", amount:kobo(el("whtamt").value)}; el("dopay").click(); };
        el("whtnone").onclick = () => { whtOverride = {mode:"off"}; el("dopay").click(); };
      } else err(e);
    }
  };
}

// ════════ Reconciliation (Spec 04 §6–7) ════════
// The needs-review state is the no-Suspense mechanism: flagging posts NOTHING;
// the unclear line is quarantined visibly and carries forward until resolved.

const RCHIP = { unmatched:["sent","To sort out"], matched:["paid","Matched"], entry_created:["paid","Recorded"],
  needs_review:["overdue","Needs review"], written_off:["draft","Written off"], import_error:["void","Import error"] };

async function viewRecon(bankId, label){
  const open = await invoke("recon_open",{bankAccountId:bankId});
  if (!open){
    chrome("recon", `<div class="card"><h3>Check ${esc(label)} against the bank</h3>
      <div class="mut">Take these two numbers from the bank statement you're checking.</div>
      <div class="row">
        <div><label>Statement end date</label><input type="date" id="r-date" value="${today()}"/></div>
        <div><label>Closing balance on the statement (₦)</label><input type="text" id="r-bal" placeholder="0.00" style="text-align:right"/></div>
      </div>
      <div class="nav"><button class="ghost" id="r-back">Back</button><button id="r-start">Start checking</button></div></div>`);
    el("r-back").onclick = viewBank;
    el("r-start").onclick = async () => {
      try {
        await invoke("recon_start",{companyId:CO.id, bankAccountId:bankId,
          statementDate:el("r-date").value, statementBalanceKobo:kobo(el("r-bal").value)});
        viewRecon(bankId, label);
      } catch(e){ err(e); }
    };
    return;
  }
  const st = await invoke("recon_state",{reconId:open.id});
  const row = l => {
    const [cls, lbl] = RCHIP[l.state] || ["draft", l.state];
    const acts = [];
    if (l.state==="unmatched" || l.state==="needs_review"){
      acts.push(`<a class="navlink" data-ra="match" data-id="${l.id}">Match</a>`);
      acts.push(`<a class="navlink" data-ra="writeoff" data-id="${l.id}">Write off</a>`);
      if (l.state==="unmatched") acts.push(`<a class="navlink" data-ra="flag" data-id="${l.id}">Not sure</a>`);
      acts.push(`<a class="navlink" data-ra="mistake" data-id="${l.id}">Bad row</a>`);
    }
    if (l.state==="matched" || l.state==="entry_created")
      acts.push(`<a class="navlink" data-ra="unmatch" data-id="${l.id}">Undo</a>`);
    return `<tr><td>${dmy(l.stmt_date)}</td><td>${esc(l.description||"")}
        ${l.carried?'<span class="mut">· brought forward</span>':""}
        ${l.review_note?`<div class="mut" style="font-size:12px">${esc(l.review_note)}</div>`:""}</td>
      <td>${naira(l.amount_kobo)}</td><td><span class="chip ${cls}">${lbl}</span>${l.match_kind==="auto"?' <span class="mut">auto</span>':""}</td>
      <td><span id="act-${l.id}">${acts.join(" ")}</span></td></tr>`;
  };
  chrome("recon", `<div class="card"><h3>Checking ${esc(label)}</h3>
    <div class="ok">Statement balance ${naira(st.statement_balance_kobo)} · Matched so far ${naira(st.matched_kobo)}
      · Still to sort out ${naira(st.unresolved_kobo)} · In your books at that date ${naira(st.ledger_at_date_kobo)}
      · In the books but not on this statement ${naira(st.outstanding_kobo)}</div>
    <details ${st.lines.length?"":"open"} style="margin:12px 0"><summary class="mut">Import the bank statement (CSV file)</summary>
      <div class="row" style="margin-top:8px">
        <div><label>File</label><input type="file" id="csvfile" accept=".csv,.txt"/></div>
        <div><label>Rows to skip (headers)</label><input type="text" id="m-skip" value="1"/></div>
        <div><label>Date format</label><select id="m-fmt"><option>DMY</option><option>YMD</option><option>MDY</option></select></div>
      </div>
      <div class="row">
        <div><label>Date column #</label><input type="text" id="m-date" value="1"/></div>
        <div><label>Description column #</label><input type="text" id="m-desc" value="2"/></div>
        <div><label>Amount style</label><select id="m-mode"><option value="dc">Debit + credit columns</option><option value="signed">One signed column</option></select></div>
        <div id="m-dcwrap"><label>Debit / credit col #</label><div class="row">
          <input type="text" id="m-dr" value="3"/><input type="text" id="m-cr" value="4"/></div></div>
      </div>
      <button class="ghost" id="doimport" style="margin-top:8px">Import</button>
      <div class="mut" style="margin-top:4px">Column numbers count from 1, left to right. Lines already imported before are skipped automatically.</div>
    </details>
    ${st.lines.length?`<table><tr><th>Date</th><th>Bank says</th><th>Amount</th><th>Status</th><th></th></tr>
      ${st.lines.map(row).join("")}</table>`:""}
    <div class="nav"><button class="ghost" id="r-back">Back</button>
      <button id="r-done">Finish checking</button></div></div>`);
  el("r-back").onclick = viewBank;

  el("doimport").onclick = async () => {
    const f = el("csvfile").files[0];
    if (!f) return err({message:"Choose the CSV file your bank gave you."});
    const text = await f.text();
    const dc = el("m-mode").value === "dc";
    const col = id => Math.max(0, (parseInt(el(id).value,10)||1) - 1);
    try {
      const res = await invoke("recon_import_csv",{reconId:open.id, csvText:text, mapping:{
        header_rows: parseInt(el("m-skip").value,10)||0,
        date_col: col("m-date"), desc_col: col("m-desc"),
        amount_col: dc ? null : col("m-dr"),
        debit_col: dc ? col("m-dr") : null, credit_col: dc ? col("m-cr") : null,
        date_format: el("m-fmt").value, flip_sign: false }});
      toast(`${res.imported} line(s) imported, ${res.skipped} already present${res.errors.length?`, ${res.errors.length} row(s) couldn't be read`:""}.`);
      viewRecon(bankId, label);
    } catch(e){ err(e); }
  };

  const inlineNote = (id, placeholder, onGo) => {
    el(`act-${id}`).innerHTML = `<input type="text" id="note-${id}" placeholder="${placeholder}" style="max-width:220px"/>
      <button class="ghost" id="go-${id}" style="padding:4px 10px">OK</button>`;
    el(`go-${id}`).onclick = () => onGo(el(`note-${id}`).value);
  };

  document.querySelectorAll("[data-ra]").forEach(a => a.onclick = async () => {
    const id = a.dataset.id;
    try {
      if (a.dataset.ra === "unmatch"){ await invoke("recon_unmatch",{lineId:id}); return viewRecon(bankId, label); }
      if (a.dataset.ra === "mistake"){
        if (!window.confirm("Mark this row as an import mistake? It'll be set aside — nothing goes into your books.")) return;
        await invoke("recon_import_error",{lineId:id}); return viewRecon(bankId, label);
      }
      if (a.dataset.ra === "flag")
        return inlineNote(id, "What do you know about this line?", async note => {
          try { await invoke("recon_flag",{lineId:id, note}); viewRecon(bankId, label); } catch(e){ err(e); }
        });
      if (a.dataset.ra === "writeoff")
        return inlineNote(id, "Why write it off? (e.g. bank charge)", async note => {
          try { await invoke("recon_writeoff",{lineId:id, note}); toast("Written off — recorded in your books."); viewRecon(bankId, label); } catch(e){ err(e); }
        });
      if (a.dataset.ra === "match"){
        const cands = await invoke("recon_candidates",{reconId:open.id, lineId:id});
        if (!cands.length) return err({message:"Nothing nearby in your books to match — record it first (Record Expense / Record Payment), then match."});
        el(`act-${id}`).innerHTML = cands.map(c=>`<label style="display:block;font-weight:400;font-size:13px">
            <input type="checkbox" data-cand="${c.journal_line_id}"/> ${dmy(c.entry_date)} · ${esc(c.memo)} · ${naira(c.amount_kobo)}</label>`).join("")
          + `<button class="ghost" id="go-${id}" style="padding:4px 10px;margin-top:4px">Match selected</button>`;
        el(`go-${id}`).onclick = async () => {
          const ids = [...el(`act-${id}`).querySelectorAll("[data-cand]:checked")].map(c=>c.dataset.cand);
          try { await invoke("recon_match",{lineId:id, journalLineIds:ids}); viewRecon(bankId, label); } catch(e){ err(e); }
        };
      }
    } catch(e){ err(e); }
  });

  el("r-done").onclick = async () => {
    try {
      const status = await invoke("recon_complete",{reconId:open.id});
      toast(status === "completed_with_exceptions"
        ? "Done — the unclear lines are saved for your advisor and will come back next time."
        : "Fully checked — everything accounted for.");
      viewBank();
    } catch(e){ err(e); }
  };
}

// ════════ Payments register + voids (Spec 03 §6) ════════

async function viewPayments(){
  const rows = await invoke("list_payments",{companyId:CO.id});
  const body = rows.length ? `<div class="card"><h3>Payments</h3><table>
      <tr><th>Date</th><th></th><th>Who</th><th>Account</th><th>Amount</th><th>Receipt</th><th></th></tr>
      ${rows.map(p=>`<tr ${p.voided?'style="opacity:.45;text-decoration:line-through"':""}>
        <td>${dmy(p.payment_date)}</td><td>${p.direction==="in"?"In":"Out"}</td>
        <td>${esc(p.contact||"")}</td><td>${esc(p.bank)}</td><td>${naira(p.amount_kobo)}</td>
        <td>${esc(p.receipt_number||"")}</td>
        <td>${p.voided?"":`<a class="navlink" data-vp="${p.id}">Cancel</a>`}</td></tr>`).join("")}
    </table></div>`
    : `<div class="card"><h3>Payments</h3><div class="mut">Nothing here yet.</div></div>`;
  chrome("pays", body);
  document.querySelectorAll("[data-vp]").forEach(a => a.onclick = async () => {
    if (!window.confirm("Cancel this payment? The money goes back to owing on the invoice or bill it paid — nothing is deleted.")) return;
    try { await invoke("void_payment_cmd",{paymentId:a.dataset.vp, confirmSoftClose:false});
      toast("Payment cancelled."); viewPayments(); } catch(e){ err(e); }
  });
}

let toastTimer;
function toast(msg){
  let t = el("toast");
  if (!t){ t = document.createElement("div"); t.id = "toast";
    t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#14532d;color:#fff;padding:10px 22px;border-radius:99px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:9";
    document.body.appendChild(t); }
  t.textContent = msg; t.style.display = "";
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>{ t.style.display="none"; }, 5000);
}

// First run: EULA + wizard (which signs the owner in at the end). Returning
// with no session yet this launch: pick who's using it (Spec 07 §5) — never
// a password gate for ordinary attribution, just "who am I recording as."
invoke("list_companies").then(async cs => {
  if (!cs.length){ render(); return; }
  CO = cs[0];
  const session = await invoke("current_session").catch(() => null);
  if (session){ SESSION = session; viewDashboard(); } else { viewUserPicker(); }
}).catch(() => render());
</script>
